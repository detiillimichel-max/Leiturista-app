<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060608">
    <title>OIO ONE · Família</title>
    <link rel="manifest" href="./manifest.json">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root {
            --accent: #00e5ff; --accent-rgb: 0, 229, 255;
            --bg: #060608; --surface: #0d0d12;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e8e8f0; --muted: #808090;
            --wa-green: #25d366; --wa-blue: #34b7f1;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Nunito', sans-serif; height: 100vh; 
            overflow: hidden; position: fixed; width: 100%;
        }

        /* --- UI WHATSAPP PREMIUM --- */
        #app-shell { display: flex; flex-direction: column; height: 100%; }

        header {
            padding-top: var(--safe-top);
            background: rgba(13, 13, 18, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .nav-top {
            height: 60px; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 16px;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 40px; height: 40px; border-radius: 50%; 
            background: var(--glass); border: 1px solid var(--accent);
            object-fit: cover;
        }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 20px 16px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; background-color: var(--bg);
            display: flex; flex-direction: column; gap: 8px;
        }

        /* Bolhas Estilo WhatsApp */
        .msg {
            max-width: 85%; padding: 8px 12px; border-radius: 12px;
            font-size: 0.95rem; position: relative; animation: fadeIn 0.3s ease;
        }
        .msg.me {
            align-self: flex-end; background: #056162; color: white;
            border-bottom-right-radius: 2px;
        }
        .msg.them {
            align-self: flex-start; background: #262d31; color: white;
            border-bottom-left-radius: 2px;
        }
        .msg-meta { 
            font-size: 0.65rem; opacity: 0.6; text-align: right; 
            margin-top: 4px; font-family: 'Rajdhani'; 
        }

        /* Barra de Entrada */
        .input-area {
            background: var(--surface); padding: 10px 12px calc(10px + var(--safe-bottom));
            display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border);
        }
        .input-field {
            flex: 1; background: #1e1e26; border: none; border-radius: 24px;
            padding: 10px 16px; color: white; outline: none; font-size: 1rem;
        }
        .btn-icon {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .btn-send { background: var(--accent); color: black; }
        .btn-mic.recording { background: #ff2d55; color: white; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo Galeria Social */
        #gallery-overlay {
            position: fixed; inset: 0; background: black; z-index: 2000;
            display: none; flex-direction: column;
        }
        .video-feed {
            flex: 1; overflow-y: scroll; snap-type: y mandatory;
        }
        .video-card {
            height: 100vh; width: 100%; snap-align: start; position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="app-shell">
    <header>
        <div class="nav-top">
            <div class="user-info">
                <img id="my-avatar" class="avatar" src="https://github.com/MichelDetilli.png">
                <div>
                    <strong id="display-name">OIO Família</strong>
                    <div style="font-size: 0.7rem; color: var(--accent)">Online</div>
                </div>
            </div>
            <div style="display: flex; gap: 20px;">
                <i class="fa-solid fa-clapperboard" onclick="toggleGallery(true)"></i>
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
        </div>
    </header>

    <main class="chat-container" id="chat-box"></main>

    <footer class="input-area">
        <i class="fa-solid fa-paperclip btn-icon" style="color: var(--muted)" onclick="document.getElementById('file-input').click()"></i>
        <input type="text" id="msg-input" class="input-field" placeholder="Mensagem">
        <div id="mic-btn" class="btn-icon" style="background: var(--glass); color: var(--accent)" onclick="handleMic()">
            <i class="fa-solid fa-microphone"></i>
        </div>
        <div class="btn-icon btn-send" id="send-btn" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </div>
    </footer>
</div>

<input type="file" id="file-input" hidden accept="image/*,video/*">

<div id="gallery-overlay">
    <div style="position: absolute; top: 20px; left: 20px; z-index: 10; color: white;" onclick="toggleGallery(false)">
        <i class="fa-solid fa-chevron-left fa-2x"></i>
    </div>
    <div class="video-feed" id="video-feed"></div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
        databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
        projectId: "vibe-app-bbba2",
        storageBucket: "vibe-app-bbba2.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let userName = localStorage.getItem("user_name") || prompt("Seu nome:") || "Membro";
    localStorage.setItem("user_name", userName);

    // REALTIME CHAT
    function sendMessage() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        
        db.ref('messages').push({
            user: userName,
            text: input.value,
            timestamp: Date.now()
        });
        input.value = "";
    }

    db.ref('messages').limitToLast(50).on('value', snap => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(child => {
            const m = child.val();
            const isMe = m.user === userName;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'me' : 'them'}`;
            div.innerHTML = `
                <div style="font-size: 0.7rem; font-weight: bold; color: var(--accent)">${isMe ? '' : m.user}</div>
                <div>${m.text}</div>
                <div class="msg-meta">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    // GALERIA & MÍDIA (Lógica Simplificada para um arquivo)
    function toggleGallery(show) {
        document.getElementById('gallery-overlay').style.display = show ? 'flex' : 'none';
    }

    // REGISTRO DE SERVICE WORKER
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => console.log("SW Ativo"));
    }
</script>
</body>
</html>
